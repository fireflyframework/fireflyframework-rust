[package]
name = "firefly-sample-lumen"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Firefly Framework for Rust — Lumen, the digital-wallet & ledger service that the book builds chapter by chapter"
publish = false

[[bin]]
name = "lumen"
path = "src/main.rs"

[dependencies]
# The one-dependency story: the `firefly` facade re-exports the whole
# framework AND every `#[derive(...)]` / `#[...]` macro. Generated code
# resolves runtime types through the facade's `__rt` contract, so Lumen
# never lists the underlying `firefly-*` crates. The `admin` feature pulls in
# the self-hosted admin dashboard (`firefly::admin`) the management port mounts.
firefly = { workspace = true, features = ["admin"] }

# The two ecosystem crates a Firefly service still writes against directly:
# axum (you author the controller handlers) and serde (your messages and
# event payloads are Serialize/Deserialize). `serde_json` encodes/decodes the
# event-store payloads, mirroring every other sample.
axum = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# Async runtime for `#[tokio::main]`, and the id/clock crates the domain uses
# for wallet ids and event timestamps.
tokio = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
async-trait = { workspace = true }

[features]
# The reactive streaming endpoint (`GET /api/v1/wallets/:id/events` → NDJSON /
# SSE) is feature-gated so the teaching baseline stays lean; chapter 18
# ("production") turns it on. It needs nothing beyond the `firefly` facade
# (`firefly::reactive::Flux` + `firefly::web::{NdJson, Sse}`).
default = []
streaming = []

[dev-dependencies]
# Drive the macro-generated router in-process, no socket bound.
tower = { workspace = true }
http-body-util = { workspace = true }
reqwest = { workspace = true }
