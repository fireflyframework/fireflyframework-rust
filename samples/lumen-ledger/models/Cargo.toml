[package]
name = "firefly-sample-lumen-ledger-models"
version.workspace = true
edition.workspace = true
publish = false
description = "Lumen Ledger — persistence entity + the sqlx repository (firefly-oss -models module)"

[lib]
name = "lumen_ledger_models"
path = "src/lib.rs"

[dependencies]
firefly = { workspace = true, features = ["data-sqlx"] }
firefly-sample-lumen-ledger-interfaces = { path = "../interfaces" }
serde = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
sqlx = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
