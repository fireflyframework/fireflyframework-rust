[package]
name = "firefly-sample-macro-quickstart"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Firefly Framework for Rust — the macro/facade quickstart: a complete service in one dependency"
publish = false

[[bin]]
name = "macro-quickstart"
path = "src/main.rs"

[dependencies]
# The one-dependency story: the `firefly` facade re-exports the whole
# framework AND every `#[derive(...)]` / `#[...]` macro. Generated code
# resolves runtime types through the facade's `__rt` contract, so a
# service never lists the underlying `firefly-*` crates.
firefly = { workspace = true }

# The two ecosystem crates a Firefly service still writes against directly:
# axum (you author axum handlers) and serde (your messages are Serialize).
axum = { workspace = true }
serde = { workspace = true }

# Async runtime for `#[tokio::main]`.
tokio = { workspace = true }

[dev-dependencies]
# Drive the macro-generated router in-process, no socket bound.
tower = { workspace = true }
http-body-util = { workspace = true }
serde_json = { workspace = true }
