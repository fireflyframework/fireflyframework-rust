5C269.893 51.55 271.243 48.55 272.943 46.15C274.643 43.75 276.743 41.85 279.243 40.45C281.743 39.05 284.493 38.05 287.493 37.45C290.593 36.85 293.943 36.55 297.543 36.55C299.143 36.55 300.943 36.7 302.943 37C305.043 37.2 306.743 37.55 308.043 38.05V59.95C306.943 58.75 305.843 57.8 304.743 57.1C303.643 56.3 302.043 55.9 299.943 55.9C298.743 55.9 297.643 56.1 296.643 56.5C295.743 56.8 294.943 57.3 294.243 58C293.643 58.6 293.143 59.45 292.743 60.55C292.443 61.65 292.293 62.9 292.293 64.3V68.95H308.043V87.55H291.993V145H267.243ZM345.693 145H321.093V40.3H345.693V145ZM382.828 174.4C380.128 174.4 377.428 174.15 374.728 173.65C372.128 173.15 369.828 172.45 367.828 171.55V151.6C369.728 152.2 371.378 152.65 372.778 152.95C374.278 153.25 375.778 153.4 377.278 153.4C379.578 153.4 381.628 152.85 383.428 151.75C385.228 150.75 386.728 148.95 387.928 146.35C389.128 143.75 389.978 140 390.478 135.1L391.078 149.5L358.378 68.95H386.728L402.478 119.95H400.228L415.678 68.95H442.378L413.128 144.85C410.328 152.05 407.328 157.8 404.128 162.1C400.928 166.5 397.528 169.65 393.928 171.55C390.328 173.45 386.628 174.4 382.828 174.4Z"/>
    <circle cx="454" cy="53" r="15" fill="url(#dotGrad)"/>
  </g>
  <text x="63" y="660" fill="#f6a821" font-size="46" font-weight="600" letter-spacing="-1">for Rust</text>
  <text x="65" y="708" fill="#d4793a" font-size="40" font-weight="600">by Example</text>

  <!-- thin amber rule under the title -->
  <rect x="63" y="726" width="360" height="2.5" rx="1.25" fill="#f6a821" opacity="0.55"/>

  <!-- subtitle -->
  <text x="63" y="770" fill="#c9b59c" font-size="21" font-weight="400">Event-Driven Rust Microservices</text>
  <text x="63" y="798" fill="#c9b59c" font-size="21" font-weight="400">with the Firefly Framework</text>

  <!-- footer wordmark -->
  <g transform="translate(60,858)">
    <circle cx="9" cy="0" r="9" fill="#f6a821"/>
    <circle cx="9" cy="0" r="4" fill="#16110c"/>
    <text x="28" y="6" fill="#a8917a" font-size="18" font-weight="700" letter-spacing="1">FIREFLY</text>
    <text x="120" y="6" fill="#6b5b48" font-size="18" font-weight="400" letter-spacing="1">· tokio + axum · Rust 1.85+</text>
  </g>
</svg>
