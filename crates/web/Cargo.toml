[package]
name = "firefly-web"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Firefly Framework for Rust — Problem renderer, correlation, idempotency, PII masking middleware"

[dependencies]
firefly-kernel = { workspace = true }
# Supplies the `bean::Validate` trait + `ValidationErrors` the `Valid<T>`
# extractor runs after JSON decoding (failure → 422 problem via FireflyError).
firefly-validators = { workspace = true }
# Reactive (WebFlux/Reactor-style) HTTP surface: Mono/Flux responders.
firefly-reactive = { workspace = true }
# Reused for the Flux→SSE responder's canonical wire format.
firefly-sse = { workspace = true }
axum = { workspace = true }
# `limit` enables tower::limit::GlobalConcurrencyLimitLayer for the
# pyfly-parity server module (max_concurrent_connections).
tower = { workspace = true, features = ["limit"] }
http = { workspace = true }
# Same major as axum's transitive http-body; needed to implement the
# response-teeing CaptureBody without buffering (Go captureWriter parity).
http-body = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
# Byte buffers for the reactive NDJSON/SSE streaming responders.
bytes = { workspace = true }
chrono = { workspace = true }
regex = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
base64 = { workspace = true }
# ---- pyfly-parity layer (web + server briefs) ----
tokio = { workspace = true }
tracing = { workspace = true }
rand = { workspace = true }
uuid = { workspace = true }
quick-xml = { workspace = true }
axum-server = { workspace = true }
# Pin the rustls process-level CryptoProvider to `ring` so TLS works
# deterministically even when both ring and aws-lc-rs are present in the
# dependency graph (lettre pulls ring, reqwest pulls aws-lc-rs).
rustls = { workspace = true }
socket2 = { workspace = true }

[dev-dependencies]
http-body-util = { workspace = true }
tracing-subscriber = { workspace = true }
# For the lifecycle-wiring doctest of `firefly_web::server::serve`
# (lifecycle is dependency-light and does not depend on firefly-web,
# so this dev-edge introduces no cycle).
firefly-lifecycle = { workspace = true }
