[package]
name = "firefly-scheduling"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Firefly Framework for Rust — Cron + FixedRate + FixedDelay scheduler"

[dependencies]
# Bean-based scheduled-task discovery resolves the bean from the DI container, so
# the registration thunk references `firefly_container::Container` (container does
# not depend on scheduling, so this is acyclic).
firefly-container = { workspace = true }
tokio = { workspace = true }
chrono = { workspace = true }
chrono-tz = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
# Link-time task discovery: `#[scheduled]` submits a `ScheduledRegistration`
# thunk drained by `register_discovered_scheduled`.
inventory = { workspace = true }
futures = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
uuid = { workspace = true }
sha2 = { workspace = true }
redis = { workspace = true }
tokio-postgres = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
