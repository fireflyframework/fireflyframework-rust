[package]
name = "firefly-macros"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Firefly Framework for Rust — derive/attribute macros (the declarative service-development layer)"

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { workspace = true }
darling = { workspace = true }

[dev-dependencies]
# The macros are exercised end-to-end against the one-dependency facade, so a
# user-style consumer compiles the generated `::firefly::__rt::...` paths.
firefly = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
# `tower::ServiceExt::oneshot` drives a generated `#[rest_controller]` router in
# tests without binding a socket; `http-body-util` collects the response body.
tower = { workspace = true }
http-body-util = { workspace = true }
# trybuild is not in the workspace catalog — pin it directly here.
trybuild = "1"
