[package]
name = "firefly-macros"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Firefly Framework for Rust — derive/attribute macros (the declarative service-development layer)"

[lib]
proc-macro = true

[dependencies]
syn = { workspace = true }
quote = { workspace = true }
proc-macro2 = { workspace = true }
darling = { workspace = true }
# Compile-checks `#[validate(pattern = "...")]` regexes at macro-expansion time
# (same crate the validators runtime re-exports), so an invalid pattern is a
# clear attribute-site error rather than a runtime panic in the generated code.
regex = { workspace = true }

[dev-dependencies]
# The macros are exercised end-to-end against the one-dependency facade, so a
# user-style consumer compiles the generated `::firefly::__rt::...` paths.
# `data-sqlx` is enabled so the `#[repository]` derived-query macro can be
# tested against a real SQLite repository.
firefly = { workspace = true, features = ["data-sqlx"] }
# `firefly-scheduling` is depended on directly (not via the facade) so the
# `#[async_method]` macro test can route through a local `__rt` shim, exercising
# the executor surface without compiling the heavy facade.
firefly-scheduling = { workspace = true }
sqlx = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
async-trait = { workspace = true }
axum = { workspace = true }
# `tower::ServiceExt::oneshot` drives a generated `#[rest_controller]` router in
# tests without binding a socket; `http-body-util` collects the response body.
tower = { workspace = true }
http-body-util = { workspace = true }
# trybuild is not in the workspace catalog — pin it directly here.
trybuild = "1"
