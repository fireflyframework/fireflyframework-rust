[package]
name = "firefly-idp-internal-db"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Firefly Framework for Rust — Self-hosted IdP (bcrypt + HS256 JWT)"

[dependencies]
firefly-idp = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
chrono = { workspace = true }
bcrypt = { workspace = true }
jsonwebtoken = { workspace = true }
hmac = { workspace = true }
sha2 = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }

[dev-dependencies]
# `web` enables firefly-idp's axum REST router (`idp::web`) for the
# controller oneshot tests; axum/tower/http-body-util drive in-process
# requests with no sockets.
firefly-idp = { workspace = true, features = ["web"] }
tokio = { workspace = true }
serde_json = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
http-body-util = { workspace = true }
