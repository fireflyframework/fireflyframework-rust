[package]
name = "firefly-kernel"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Firefly Framework for Rust — RFC 7807 ProblemDetail, Result envelope, Clock, correlation, FireflyError hierarchy"

[dependencies]
serde = { workspace = true }
# raw_value: ProblemDetail's Serialize impl pre-renders Go-parity JSON
