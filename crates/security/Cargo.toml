[package]
name = "firefly-security"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Firefly Framework for Rust â€” Authentication context, bearer middleware, RBAC filter chain"

[features]
# WebAuthn / passkey login (Spring Security 6.4 `webAuthn()` parity). Opt-in
# because it pulls in the `webauthn-rs` ceremony engine (and a system OpenSSL).
# The default build does not compile the `webauthn` module at all.
webauthn = ["dep:webauthn-rs", "dep:uuid"]

# LDAP / Active Directory authentication (Spring Security `ldapAuthentication()`
# parity). Opt-in because it pulls in the `ldap3` client. The default build does
# not compile the `ldap` module at all.
ldap = ["dep:ldap3"]

[dependencies]
axum = { workspace = true }
tower = { workspace = true }
http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
tracing = { workspace = true }
tokio = { workspace = true }
reqwest = { workspace = true }
jsonwebtoken = { workspace = true }
globset = { workspace = true }
rand = { workspace = true }
base64 = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }
redis = { workspace = true }
tokio-postgres = { workspace = true }
bcrypt = { workspace = true }
# Argon2id password hashing (`Argon2PasswordEncoder`) â€” the OWASP-preferred
# memory-hard alternative to bcrypt. `std` enables the OS RNG for salt generation.
argon2 = { version = "0.5", features = ["std"] }
firefly-session = { workspace = true }

# --- `webauthn` feature ----------------------------------------------------
# The WebAuthn/passkey ceremony engine (relying-party side). Optional so the
# default build is untouched; enabled by the `webauthn` feature above.
webauthn-rs = { version = "0.5.5", optional = true }
# Stable per-user handles (`user.id` in the WebAuthn `PublicKeyCredentialUser`)
# are random UUIDs; `serde` lets the in-memory handle map round-trip if needed.
uuid = { version = "1", features = ["v4", "serde"], optional = true }

# --- `ldap` feature --------------------------------------------------------
# Async LDAP/AD client (search + bind) for `LdapAuthenticationProvider`.
# Optional so the default build is untouched; enabled by the `ldap` feature.
ldap3 = { version = "0.11", optional = true, default-features = false, features = [
    "tls-rustls",
] }

[dev-dependencies]
tokio = { workspace = true }
http-body-util = { workspace = true }
tower = { workspace = true }
# Software authenticator that drives the registration/authentication ceremonies
# end to end in tests (mirrors a real browser/platform authenticator).
webauthn-authenticator-rs = { version = "0.5.5", features = ["softpasskey"] }
