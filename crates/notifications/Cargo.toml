minijinja = { workspace = true, optional = true }

[features]
default = ["minijinja"]
# Enables the local Jinja-compatible template engine (MiniJinjaTemplateEngine).
minijinja = ["dep:minijinja"]

[dev-dependencies]
tokio = { workspace = true }
