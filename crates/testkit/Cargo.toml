[package]
name = "firefly-testkit"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
rust-version.workspace = true
description = "Firefly Framework for Rust — HMAC signers, SpyBroker, JSON test helpers, in-process TestClient, DI slices"

[features]
# The base surface (HMAC signers, SpyBroker + event assertions, JSON helpers)
# carries no heavy dependencies, so a service that only needs them gets a lean
# build. The richer migration-ergonomics helpers are opt-in.
default = []

# In-process HTTP test client (`TestClient` / `TestResponse`) that drives an
# axum `Router` via `tower::ServiceExt::oneshot` without binding a socket — the
# Rust analog of pyfly's `PyFlyTestClient`. Pulls in axum/tower/http and a
# Tokio runtime for the blocking convenience wrapper.
web = ["dep:axum", "dep:tower", "dep:http", "dep:http-body-util", "dep:tokio"]

# DI test slices (`slice()` / `Slice`) over `firefly-container`: register a
# subset of beans plus `Arc` overrides and resolve them eagerly — the Rust
# analog of pyfly's `slice_context` + `mock_bean`.
container = ["dep:firefly-container"]

# Testcontainers-style integration-test fixtures: map a started backing
# service's connection details to canonical `firefly.*` config keys (the
# `@ServiceConnection` / `pyfly_config_for` analog) plus a `docker_available()`
# skip guard. Pulls in `firefly-config` so the overrides convert to a real
# `StaticSource`. No container-runtime dependency: it takes the connection URL /
# `(host, port)` handle any container library already hands you.
testcontainers = ["dep:firefly-config"]

[dependencies]
hmac = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
base64 = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }

# `web` feature
axum = { workspace = true, optional = true }
tower = { workspace = true, optional = true }
http = { workspace = true, optional = true }
http-body-util = { workspace = true, optional = true }
tokio = { workspace = true, optional = true }

# `container` feature
firefly-container = { workspace = true, optional = true }

# `testcontainers` feature
firefly-config = { workspace = true, optional = true }

[dev-dependencies]
tokio = { workspace = true }

[package.metadata.docs.rs]
all-features = true
